<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TBG chaos — temperature transition</title>
<!--
  Peter Bøggild, pbog@dtu.dk. DTU Physics, Technical University of Denmark.
  Interactive companion to chaos1..chaos4.jpg (Chau / Jespersen / Carrad,
  unpublished).  All four JPGs share the same plot layout so we stack them
  in the same rectangle and crossfade with opacity for the 7 K → 16 mK
  transition.  A slim vertical thermometer sits at the far left, over the
  baked-in thermometer artwork; a modest CSS scale enlarges the plot to
  fill the 16:9 more without eating the y-axis labels or the colour bar.
-->
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #fff;
    overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #1a2233;
  }
  #stage {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  /* 16:9 letterbox that always fits the viewport */
  #frame {
    position: relative;
    width: 100vw; height: 56.25vw;
    max-height: 100vh; max-width: 177.7778vh;
    background: #fff;
  }
  /* Image area — starts to the RIGHT of the thermometer column so the two
     are side-by-side rather than overlapping. Left inset matches the panel's
     right edge (panel_left + panel_width + small gap). */
  #imgwrap {
    position: absolute;
    left:   calc(clamp(4px, 0.4vw, 10px) + clamp(46px, 3.4vw, 62px) + 8px);
    right:  0;
    top:    0;
    bottom: 0;
    overflow: hidden;
  }
  #imgstack {
    position: absolute; inset: 0;
    /* The image is ~2.7:1 aspect; the plot area is narrower now (frame minus
       thermometer column), so filling more of the height still requires a
       modest horizontal crop. Origin biased toward the right so:
         · left crop swallows the (already-off-frame) thermometer artwork
           and B-axis tick numbers,
         · the colour bar and its numbers on the right stay inside the plot area. */
    transform-origin: 74% 50%;
    transform: scale(1.28);
    will-change: transform;
  }
  #imgstack .layer {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    will-change: opacity;
  }

  /* ── Slim thermometer column, left of the graph ────────────────────── */
  #panel {
    position: absolute;
    left:   clamp(4px, 0.4vw, 10px);
    top:    clamp(14px, 2vw, 36px);
    bottom: clamp(14px, 2vw, 36px);
    width:  clamp(46px, 3.4vw, 62px);
    display: flex; flex-direction: column; align-items: center;
    gap: 3px;
    padding: 6px 2px;
    z-index: 3;
    box-sizing: border-box;
    user-select: none;
    touch-action: none;
    /* No background / border / shadow — it should feel like a quiet control
       column next to the plot, not a card competing with it. */
  }
  #panel .lbl {
    font-weight: 700;
    font-size: clamp(10px, 1.0vw, 13px);
    line-height: 1;
    padding: 1px 0;
    text-align: center;
    letter-spacing: 0.01em;
  }
  #panel .lbl.hot  { color: #b21f1a; }
  #panel .lbl.cold { color: #1e4baa; }

  /* Vertical thermal-gradient bar */
  #therm {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    width: clamp(14px, 1.5vw, 22px);
    margin: 4px 0;
    border-radius: 20px;
    background: linear-gradient(180deg,
      #b81208 0%,
      #d92616 12%,
      #ea4a1a 25%,
      #f18928 38%,
      #edc74e 48%,
      #f5f7fa 54%,
      #c6d3ea 66%,
      #7a9adc 80%,
      #2c53b6 92%,
      #12308c 100%);
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,0.22),
      inset 0 -1px 2px rgba(255,255,255,0.20);
    border: 1px solid rgba(0,0,0,0.18);
    cursor: ns-resize;
    touch-action: none;
  }
  #therm-thumb {
    position: absolute;
    left: 50%; top: 0%;
    transform: translate(-50%, -50%);
    width:  calc(100% + 12px);
    height: clamp(11px, 1.1vw, 15px);
    background: #ffffff;
    border-radius: 4px;
    border: 1.5px solid #1a2233;
    box-shadow: 0 2px 5px rgba(0,0,0,0.28);
    pointer-events: none;
    transition: box-shadow 0.15s;
  }
  #therm-thumb::before {
    content: "";
    position: absolute;
    left: 15%; right: 15%;
    top: 50%; height: 1.5px;
    background: #1a2233;
    transform: translateY(-50%);
    border-radius: 1px;
  }
  #therm.dragging #therm-thumb {
    box-shadow: 0 3px 10px rgba(0,0,0,0.42);
  }

  #readout {
    font-family: "Consolas","Menlo",monospace;
    font-weight: 700;
    color: #b21f1a;
    font-size: clamp(11px, 1.05vw, 14px);
    padding: 2px 0 0;
    line-height: 1.1;
    text-align: center;
    width: 100%;
  }

  #hint {
    position: absolute;
    left: 50%; bottom: 2%;
    transform: translateX(-50%);
    font-size: clamp(10px, 1vw, 13px);
    color: #94a0b5;
    pointer-events: none;
    opacity: 0.8;
    transition: opacity 0.4s;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="frame">
    <div id="imgwrap">
      <div id="imgstack">
        <img class="layer" src="figures/chaos1.jpg" alt="7 K">
        <img class="layer" src="figures/chaos2.jpg" alt="warm">
        <img class="layer" src="figures/chaos3.jpg" alt="cool">
        <img class="layer" src="figures/chaos4.jpg" alt="16 mK">
      </div>
    </div>
    <div id="panel">
      <div class="lbl hot">7 K</div>
      <div id="therm" tabindex="0" role="slider"
           aria-label="Temperature" aria-valuemin="0" aria-valuemax="1" aria-valuenow="0">
        <div id="therm-thumb"></div>
      </div>
      <div class="lbl cold">16 mK</div>
      <div id="readout">7.00 K</div>
    </div>
    <div id="hint">drag the thermometer to cool the sample</div>
  </div>
</div>

<script>
"use strict";
(function(){
  const imgs    = Array.from(document.querySelectorAll("#imgstack .layer"));
  const therm   = document.getElementById("therm");
  const thumb   = document.getElementById("therm-thumb");
  const readout = document.getElementById("readout");
  const hint    = document.getElementById("hint");

  const T_HOT  = 7.0;       // 7 K   → chaos1.jpg
  const T_COLD = 0.016;     // 16 mK → chaos4.jpg

  let u = 0;                // 0 = hot, 1 = cold
  let dragging = false;

  function formatTemp(T){
    if (T >= 1)   return T.toFixed(T < 10 ? 2 : 1) + " K";
    if (T >= 0.1) return (T*1000).toFixed(0) + " mK";
    return (T*1000).toFixed(T*1000 < 100 ? 1 : 0) + " mK";
  }
  function tempFromU(u){
    const lnT = Math.log(T_HOT) + u*(Math.log(T_COLD) - Math.log(T_HOT));
    return Math.exp(lnT);
  }

  function updateBlend(){
    const p = u * (imgs.length - 1);
    for (let i = 0; i < imgs.length; i++){
      const d = Math.abs(p - i);
      imgs[i].style.opacity = Math.max(0, 1 - d);
    }
    thumb.style.top = (u * 100) + "%";
    readout.textContent = formatTemp(tempFromU(u));
    therm.setAttribute("aria-valuenow", u.toFixed(3));
  }

  function setUFromClientY(cy){
    const r = therm.getBoundingClientRect();
    let uu = (cy - r.top) / r.height;
    uu = Math.max(0, Math.min(1, uu));
    u = uu;
    updateBlend();
  }

  therm.addEventListener("pointerdown", (e) => {
    dragging = true;
    try { therm.setPointerCapture(e.pointerId); } catch(_){}
    therm.classList.add("dragging");
    setUFromClientY(e.clientY);
    hint.style.opacity = 0;
    e.preventDefault();
  });
  therm.addEventListener("pointermove", (e) => {
    if (!dragging) return;
    setUFromClientY(e.clientY);
  });
  const endDrag = () => {
    dragging = false;
    therm.classList.remove("dragging");
  };
  therm.addEventListener("pointerup",           endDrag);
  therm.addEventListener("pointercancel",       endDrag);
  therm.addEventListener("lostpointercapture",  endDrag);

  // Keyboard accessibility
  therm.addEventListener("keydown", (e) => {
    const step = e.shiftKey ? 0.05 : 0.01;
    if (e.key === "ArrowDown" || e.key === "ArrowRight"){
      u = Math.min(1, u + step); updateBlend(); e.preventDefault();
    } else if (e.key === "ArrowUp" || e.key === "ArrowLeft"){
      u = Math.max(0, u - step); updateBlend(); e.preventDefault();
    } else if (e.key === "Home"){ u = 0; updateBlend(); e.preventDefault(); }
    else if   (e.key === "End" ){ u = 1; updateBlend(); e.preventDefault(); }
  });

  updateBlend();
})();
</script>
</body>
</html>
